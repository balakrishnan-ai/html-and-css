<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flexbox Example</title>
    <style>
        .container{
            display: flex;
            flex-direction:row;
            flex-wrap:wrap;
            justify-content:space-around;
            align-items:center;
            align-content:center;
            height:300px;
            border:2px solid black;
            margin:20px;
        }.item{
            background:lightblue;
            border:1px solid blue;
            padding:20px;
            margin:5px;
            font-size:18px;
            text-align:center;
        }.item1{
            order:3;
        }.item2{
            align-self:flex-start;
        }.item3{
            order:1;
        }
    </style>
</head>
<body>
    <h2>CSS Flexbox Example</h2>
    <div class="container">
        <div class="item item1">Box1 (order 3)</div>
        <div class="item item2">Box2 (align-self start)</div>
        <div class="item item3">Box3 (order 1)</div>
        <div class="item">Box1</div>
        <div class="item">Box2</div>
        <div class="item">Box3</div>
    </div>
</body>
</html>
