<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position and property</title>
    <style>
        .box1{
            position:relative;
            left:50px;
            top:20px;
            background:lightblue;
        }.box2{
            position:absolute;
            top:30px;
            left:30px;
            background:pink;
        }.box3{
            position:fixed;
            bottom:10px;
            right:10px;
            background:orange;
        }.box4{
            position:sticky;
            top:0;
            background:yellow;
        }
    </style>
</head>
<body>
    <div class="box1">Relative Box</div>
    <div class="box2">Absolute Box</div>
    <div class="box3">Sticky Header</div>
    <div class="box4">Fixed Box</div>
</body>
</html>
