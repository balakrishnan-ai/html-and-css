<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tables</title>
    <style>
        table{
            border-collapse: collapse;
            width:60%;
            margin:20px 0;
        }th,td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }th{
            background-color:lightblue;
        }
        /* Zebra striping using nth-child */
        tr:nth-child(even){
            background-color:#f2f2f2;
        }tr:nth-child(odd){
            background-color:#ffffff;
        }
    </style>
</head>
<body>
    <h2>Student Marks Table</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>Bala</td>
            <td>java</td>
            <td>100</td>
        </tr>
        <tr>
            <td>Karthikeyan</td>
            <td>Python</td>
            <td>90</td>
        </tr>
        <tr>
            <td>Dhamo</td>
            <td>c++</td>
            <td>75</td>
        </tr>
        <tr>
            <td>Ramdinesh</td>
            <td>SQL</td>
            <td>88</td>
        </tr>
    </table>
</body>
</html>
