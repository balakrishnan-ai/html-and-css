<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Image Hover Scale & Rotate</title>
    <style>
        .img-hover{
            width:150px;
            transition:transform 0.4s;
        }.img-hover:hover{
            transform:scale(1.2)rotate(5deg);
        }
    </style>
</head>

<body>
    <img src="assets/itachi.jpg" alt="" class="img-hover">
    <img src="assets/naruto.jpg" alt="" class="img-hover">
</body>

</html>
