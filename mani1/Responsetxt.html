<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Text</title>
    <style>
        p{font-size:200px;}
        @media(max-width:768px){
            p{font-size:16px;}
        }
        @media(max-width:480px){
            p{font-size:14px;}
        }
    </style>
</head>
<body>
    <p>This text resizes based on screen width.</p>
</body>
</html>
