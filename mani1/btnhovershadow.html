<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Hover with Shadow & Scale</title>
    <style>
        .button{
            padding:15px 30px;
            background-color:teal;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            transition:transform 0.3s,box-shadow 0.3s;
        }.button:hover{
            transform:scale(1.1);
            box-shadow:0.8px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <button class="button">Hover Me</button>
</body>
</html>
