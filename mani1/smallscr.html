<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Background on Small Screens</title>
    <style>
        body{background:lightblue;}
        @media(max-width:600px){
            body{background:lightgreen;}
        }
    </style>
</head>
<body>
    <h2>Resise the browser to see the background change</h2>
</body>
</html>
