<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Search Bar</title>
    <style>
        body{
            text-align: center;
            margin-top: 100px;
        }input[type="search"]{
            width: 350px;
            padding: 12px;
            border: 2px solid #888;
            border-radius: 25px;
        }button{
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: green;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <form action="">
        <input type="search" name="" id="" placeholder="Search website...">
        <button type="submit">Search</button>
    </form>
</body>
</html>
