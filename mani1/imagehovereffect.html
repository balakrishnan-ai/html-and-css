<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Hover Effect</title>
    <style>
        img{
            width:200px;
            transition:5s;
        }img:hover{
            transform:scale(3)rotate(50deg);
            opacity:0.5;
        }
    </style>
</head>
<body>
    <img src="assets/itachi.jpg" alt="Itachi Image" srcset="">
</body>
</html>
