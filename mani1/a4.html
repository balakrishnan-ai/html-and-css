<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .search-box{
            width: 300px;
            padding: 10px;
            border: 2px solid gray;
            border-radius: 20px;
        }.search-btn{
            padding: 10px 15px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }.search-btn:hover{
            background-color: darkblue;
        }
    </style>
</head>
<body>
    <form action="">
        <input type="search" name="" id="" class="search-box" placeholder="Search Something....">
        <button type="submit" class="search-btn">🔍</button>
    </form>
</body>
</html>
