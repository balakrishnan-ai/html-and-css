<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover on Links Example</title>
    <style>
        a{
            text-decoration:none;
            color:green;
            font-size:20px;
        }a:hover{
            color:red;
            text-decoration:underline;
        }
    </style>
</head>
<body>
    <a href="http://google.com">Hover Over this Link</a>
</body>
</html>
