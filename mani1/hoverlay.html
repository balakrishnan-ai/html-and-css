<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Overlay on Image</title>
    <style>
        .container{
            position:relative;
            width:300px;
        }.image{
            display:block;
            width:100%;
        }.overlay{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background-color:rgba(0,0,0,0.6);
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            opacity:0;
            transition:opacity 0.3s;
        }.container:hover .overlay{
            opacity:1;
        }
    </style>
</head>
<body>
    <h2>Hover Image Overlay</h2>
    <div class="container">
        <img src="assets/itachi.jpg" class="image" alt="" srcset="">
        <div class="overlay">Hovered Text</div>
    </div>
</body>
</html>
