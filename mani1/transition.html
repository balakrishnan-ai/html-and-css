<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transition & Animation</title>
    <style>
        .btn {
            background: blue;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius:10px;
            transition:transform 0.5s ease,background 0.4s;
        }.btn:hover{
            background:darkblue;
            transform:scale(1.2)rotate(20deg);
        }.ball{
            width:50px;
            height:50px;
            background:red;
            border-radius:100%;
            margin:50px auto;
            animation:bounce 2s infinite forwards;
        }@keyframes bounce{
            0%{transform:translateX(50px);}
            25%{transform:translateY(100px);}
            50%{transform:translateY(150px);}
            75%{transform:translateX(200px)}
            100%{transform:translateX(-200px);}
        }
    </style>
</head>

<body>
    <h2>CSS Transition & Animation</h2>
    <button class="btn">Hover Me</button>
    <div class="ball"></div>
</body>

</html>
