<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Button Exaample</title>
    <style>
        button{
            background-color:blue;
            color:white;
            padding:10px 10px;
            border:none;
            cursor:pointer;
        }button:hover{
            background-color:darkblue;
            transform:scale(1.1)rotate(360deg);
        }
    </style>
</head>
<body>
    <button>Hover Me</button>
</body>
</html>
