<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span{
            display:inline;
        }
        p{
            display:block;
        }
        button{
            display:inline-block;
            width:100px;
            height:40px;
        }
        .hidden{
            display:none;
        }
    </style>
</head>
<body>
    <span>Inline 1</span>
    <span>Inline 2</span>
    <p>Block element</p>
    <button>Click me</button>
    <div class="hidden">This will not show</div>

</body>
</html>
